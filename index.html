<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CIAM Architecture Diagrams</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #5d667a;
      --paper: #fff;
      --page: #eef1f5;
      --line: #c7ced9;
      --active: #1f5f8b;
      --active-soft: #e6f1fa;
      --tenant: #dbeef3;
      --vnet: #ebf1df;
      --front-door: #f9c499;
      --b2c: #fee599;
      --api: #92d050;
      --portal: #92cddc;
      --lavender: #ddd6e5;
      --pink: #e5b9b5;
      --vault: #54426a;
      --cosmos: #bf9000;
      --salesforce: #b9d7f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 22px;
    }

    .workspace {
      width: min(100%, 1340px);
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid #d9dde3;
      box-shadow: 0 12px 34px rgb(23 32 51 / 10%);
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .tabs {
      display: flex;
      flex: 1 1 auto;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tab-button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: 700 14px/1 Arial, Helvetica, sans-serif;
      min-height: 38px;
      padding: 0 14px;
      transition: background .16s ease, border-color .16s ease, color .16s ease;
    }

    .tab-button:hover {
      border-color: var(--active);
      background: var(--active-soft);
    }

    .tab-button[aria-selected="true"] {
      background: var(--active);
      border-color: var(--active);
      color: #fff;
    }

    .export-controls {
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
      margin-left: auto;
    }

    .export-select,
    .export-button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: 700 14px/1 Arial, Helvetica, sans-serif;
      min-height: 38px;
    }

    .export-select {
      padding: 0 34px 0 10px;
    }

    .export-button {
      cursor: pointer;
      padding: 0 14px;
      transition: background .16s ease, border-color .16s ease, color .16s ease;
    }

    .export-button:hover {
      border-color: var(--active);
      background: var(--active-soft);
    }

    .diagram-header {
      padding: 18px 22px 8px;
    }

    .diagram-header h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .diagram-header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      max-width: 900px;
    }

    .diagram-frame {
      overflow: auto;
      padding: 12px 18px 20px;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 980px;
      height: auto;
      background: #fff;
      border: 1px solid var(--line);
    }

    .boundary {
      stroke: #8893a5;
      stroke-width: 1.2;
    }

    .lane {
      fill: #f8fafc;
      stroke: #d4dae4;
      stroke-width: 1;
    }

    .node {
      cursor: default;
      transition: opacity .15s ease;
    }

    .node-shape {
      stroke: #111827;
      stroke-width: 1.2;
      vector-effect: non-scaling-stroke;
    }

    .connector {
      fill: none;
      stroke: #111827;
      stroke-width: 1.4;
      vector-effect: non-scaling-stroke;
      marker-end: url(#arrow);
      transition: opacity .15s ease, stroke-width .15s ease;
    }

    .label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      font-weight: 700;
      pointer-events: none;
      text-anchor: middle;
    }

    .label.small {
      font-size: 12px;
      font-weight: 600;
    }

    .label.section {
      fill: #28364d;
      font-size: 18px;
      text-anchor: start;
    }

    .label.note {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .actor-line {
      stroke: #111827;
      stroke-width: 2;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
    }

    .is-dimmed {
      opacity: .22;
    }

    .is-highlight .node-shape,
    .connector.is-highlight {
      stroke: var(--active);
      stroke-width: 2.8;
    }

    .connector.is-highlight {
      opacity: 1;
    }

    .tooltip {
      position: fixed;
      z-index: 10;
      max-width: 380px;
      padding: 10px 12px;
      border: 1px solid #b9c2cf;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 8px 24px rgb(23 32 51 / 18%);
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      transform: translate(12px, 12px);
    }

    .tooltip-title {
      margin: 0 0 6px;
      font-weight: 700;
      font-size: 13px;
    }

    .tooltip dl {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 4px 8px;
      margin: 0;
    }

    .tooltip dt {
      color: var(--muted);
      font-weight: 700;
    }

    .tooltip dd {
      margin: 0;
    }

    .tooltip[hidden] {
      display: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 720px) {
      .page {
        padding: 10px;
      }

      .top-bar {
        gap: 6px;
        padding: 8px;
      }

      .tabs,
      .export-controls {
        flex: 1 1 100%;
      }

      .tab-button {
        flex: 1 1 100%;
        justify-content: center;
        min-height: 40px;
      }

      .export-select,
      .export-button {
        flex: 1 1 0;
      }

      .diagram-header {
        padding: 14px 14px 6px;
      }

      .diagram-header h1 {
        font-size: 20px;
      }

      .diagram-frame {
        padding: 8px 10px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="workspace" aria-label="CIAM architecture diagram workspace">
      <div class="top-bar">
        <nav class="tabs" role="tablist" aria-label="Architecture views">
          <button class="tab-button" type="button" role="tab" aria-selected="true" aria-controls="diagram-panel" id="tab-logical" data-view="logical">Logical Architecture</button>
          <button class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="diagram-panel" id="tab-management" data-view="management">Management Services Physical Architecture</button>
          <button class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="diagram-panel" id="tab-authentication" data-view="authentication">User Authentication Physical Architecture</button>
        </nav>
        <div class="export-controls">
          <label class="sr-only" for="export-format">Download format</label>
          <select class="export-select" id="export-format" aria-label="Download format">
            <option value="txt">Text file</option>
            <option value="csv">CSV file</option>
          </select>
          <button class="export-button" type="button" id="download-details">Download Details</button>
        </div>
      </div>

      <section id="diagram-panel" role="tabpanel" aria-labelledby="tab-logical">
        <div class="diagram-header">
          <h1 id="diagram-heading">Logical Architecture</h1>
          <p id="diagram-summary">Conceptual request flow for administrative and authentication capabilities.</p>
        </div>
        <div class="diagram-frame">

            <desc id="diagram-desc">Conceptual request flow for administrative and authentication capabilities.</desc>
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"></path>
              </marker>
            </defs>
            <g id="diagram-root"></g>
          </svg>
        </div>
      </section>
    </section>
  </main>
  <div class="tooltip" id="tooltip" hidden></div>

              title: "Salesforce",

          {

              title: "SendGrid",

        ],
        links: [
          { from: "end-user", to: "front-door" },
          { from: "front-door", to: "entra" },
          { from: "front-door", to: "single-logout" },
          { from: "entra", to: "federated-idps" },
          { from: "content", to: "entra" },
          { from: "entra", to: "runtime-apis" },
          { from: "single-logout", to: "entra" },
          { from: "single-logout", to: "applications" },
          { from: "runtime-apis", to: "cosmos" },
          { from: "runtime-apis", to: "salesforce" },
          { from: "runtime-apis", to: "sendgrid" },
          { from: "runtime-apis", to: "keyvault" }
        ]
      }
    };

    const detailFields = [
      ["purpose", "Purpose"],
      ["bespoke", "Bespoke"],
      ["scalability", "Current Scalability"],
      ["scalePlan", "Plan to Scale"],
      ["geo", "Geo Redundancy"],
      ["backup", "Backup"],
      ["gdpr", "GDPR"]
    ];

    function append(tag, attrs, parent = root) {
      const el = document.createElementNS(ns, tag);
      Object.entries(attrs || {}).forEach(([key, value]) => {
        if (value !== undefined) el.setAttribute(key, value);
      });
      parent.appendChild(el);
      return el;
    }

    function lineFor(link, nodesById) {
      const from = nodesById.get(link.from);
      const to = nodesById.get(link.to);
      const start = anchor(from, to);
      const end = anchor(to, from);
      const midX = (start.x + end.x) / 2;

      if (link.points && link.points.length) {
        const points = link.points.map(point => `L ${point.x} ${point.y}`).join(" ");
        return `M ${start.x} ${start.y} ${points} L ${end.x} ${end.y}`;
      }

      if (Math.abs(start.y - end.y) < 18 || Math.abs(start.x - end.x) < 18) {
        return `M ${start.x} ${start.y} L ${end.x} ${end.y}`;
      }

      return `M ${start.x} ${start.y} C ${midX} ${start.y}, ${midX} ${end.y}, ${end.x} ${end.y}`;
    }

    function nodeCenter(node) {
      if (node.type === "circle") return { x: node.x, y: node.y };
      if (node.type === "actor") return { x: node.x, y: node.y + 14 };
      return { x: node.x + node.w / 2, y: node.y + node.h / 2 };
    }

    function nodeBounds(node) {
      if (node.type === "circle") return { left: node.x - node.r, right: node.x + node.r, top: node.y - node.r, bottom: node.y + node.r };
      if (node.type === "actor") return { left: node.x - 45, right: node.x + 45, top: node.y - 48, bottom: node.y + 68 };
      return { left: node.x, right: node.x + node.w, top: node.y, bottom: node.y + node.h };
    }

    function anchor(node, other) {
      const from = nodeCenter(node);
      const to = nodeCenter(other);
      const bounds = nodeBounds(node);
      const dx = to.x - from.x;
      const dy = to.y - from.y;

      if (Math.abs(dx) > Math.abs(dy)) {
        return { x: dx > 0 ? bounds.right : bounds.left, y: from.y };
      }

      return { x: from.x, y: dy > 0 ? bounds.bottom : bounds.top };
    }

    function drawText(parent, lines, x, y, options = {}) {
      const sizeClass = options.className || "";
      const fill = options.fill || "var(--ink)";
      const lineHeight = options.lineHeight || 18;
      const offset = -((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, index) => {
        const text = append("text", {
          class: `label ${sizeClass}`.trim(),
          x,
          y: y + offset + index * lineHeight,
          fill
        }, parent);
        text.textContent = line;
      });
    }

    function drawActor(node) {
      const group = append("g", { class: "node", "data-node-id": node.id });
      group.appendChild(drawPerson(node.x, node.y));
      drawText(group, node.label, node.x, node.y + 66, { className: "small", lineHeight: 15, fill: node.textFill });
      return group;
    }

    function drawPerson(x, y) {
      const group = document.createElementNS(ns, "g");
      const head = document.createElementNS(ns, "circle");
      head.setAttribute("class", "node-shape");
      head.setAttribute("cx", x);
      head.setAttribute("cy", y - 22);
      head.setAttribute("r", 18);
      head.setAttribute("fill", "#111827");
      group.appendChild(head);

      const body = document.createElementNS(ns, "path");
      body.setAttribute("class", "node-shape");
      body.setAttribute("d", `M ${x - 36} ${y + 42} C ${x - 30} ${y + 6}, ${x + 30} ${y + 6}, ${x + 36} ${y + 42} Z`);
      body.setAttribute("fill", "#111827");
      group.appendChild(body);
      return group;
    }

    function drawDatabase(node) {
      const group = append("g", { class: "node", "data-node-id": node.id });
      const x = node.x;
      const y = node.y;
      const w = node.w;
      const h = node.h;
      append("path", {
        class: "node-shape",
        d: `M ${x} ${y + 18} C ${x} ${y + 8}, ${x + w} ${y + 8}, ${x + w} ${y + 18} L ${x + w} ${y + h - 18} C ${x + w} ${y + h - 8}, ${x} ${y + h - 8}, ${x} ${y + h - 18} Z`,
        fill: node.fill
      }, group);
      append("ellipse", {
        class: "node-shape",
        cx: x + w / 2,
        cy: y + 18,
        rx: w / 2,
        ry: 12,
        fill: node.fill
      }, group);
      drawText(group, node.label, x + w / 2, y + h / 2 + 6, { className: "small", lineHeight: 15, fill: node.textFill });
      return group;
    }

    function drawNode(node) {
      if (node.type === "actor") return drawActor(node);
      if (node.type === "database") return drawDatabase(node);

      const group = append("g", { class: "node", "data-node-id": node.id });
      if (node.type === "circle") {
        append("circle", {
          class: "node-shape",
          cx: node.x,
          cy: node.y,
          r: node.r,
          fill: node.fill
        }, group);
        drawText(group, node.label, node.x, node.y, { className: "small", lineHeight: 15, fill: node.textFill });
        return group;
      }

      append("rect", {
        class: "node-shape",
        x: node.x,
        y: node.y,
        width: node.w,
        height: node.h,
        rx: 4,
        fill: node.fill
      }, group);
      drawText(group, node.label, node.x + node.w / 2, node.y + node.h / 2, { className: "small", lineHeight: 15, fill: node.textFill });
      return group;
    }

    function render(viewKey) {
      const diagram = diagrams[viewKey];
      const nodesById = new Map(diagram.nodes.map(node => [node.id, node]));
      root.replaceChildren();
      svg.setAttribute("viewBox", diagram.viewBox);
      desc.textContent = diagram.summary;
      svg.setAttribute("aria-label", diagram.title);
      heading.textContent = diagram.title;
      summary.textContent = diagram.summary;

      (diagram.lanes || []).forEach(lane => {
        append("rect", { class: "lane", x: lane.x, y: lane.y, width: lane.w, height: lane.h, rx: 6 });
        const text = append("text", { class: "label section", x: lane.x + 18, y: lane.y + 32, fill: "#28364d" });
        text.textContent = lane.label;
      });

      (diagram.boundaries || []).forEach(boundary => {
        append("rect", {
          class: "boundary",
          x: boundary.x,
          y: boundary.y,
          width: boundary.w,
          height: boundary.h,
          rx: 4,
          fill: boundary.fill
        });
        const text = append("text", { class: "label section", x: boundary.x + 16, y: boundary.y + 30, fill: "#28364d" });
        text.textContent = boundary.label;
      });

      diagram.links.forEach((link, index) => {
        append("path", {
          class: "connector",
          d: lineFor(link, nodesById),
          "data-link-id": `link-${index}`,
          "data-from": link.from,
          "data-to": link.to
        });
      });

      diagram.nodes.forEach(node => {
        const element = drawNode(node);
        if (node.note) element.setAttribute("data-note", node.note);
        if (node.details) element.setAttribute("data-details", JSON.stringify(node.details));
      });

      wireHover();
    }

    function wireHover() {
      const nodes = [...root.querySelectorAll(".node")];
      const connectors = [...root.querySelectorAll(".connector")];

      function clearHighlight() {
        nodes.forEach(node => node.classList.remove("is-dimmed", "is-highlight"));
        connectors.forEach(connector => connector.classList.remove("is-dimmed", "is-highlight"));
        tooltip.hidden = true;
      }

      function highlight(id, node, event) {
        const related = new Set([id]);
        connectors.forEach(connector => {
          if (connector.dataset.from === id || connector.dataset.to === id) {
            related.add(connector.dataset.from);
            related.add(connector.dataset.to);
          }
        });

        nodes.forEach(node => {
          const nodeId = node.dataset.nodeId;
          node.classList.toggle("is-highlight", related.has(nodeId));
          node.classList.toggle("is-dimmed", !related.has(nodeId));
        });

        connectors.forEach(connector => {
          const active = connector.dataset.from === id || connector.dataset.to === id;
          connector.classList.toggle("is-highlight", active);
          connector.classList.toggle("is-dimmed", !active);
        });

        if (node.dataset.details || node.dataset.note) {
          renderTooltip(node);
          tooltip.hidden = false;
          moveTooltip(event);
        }
      }

      function renderTooltip(node) {
        tooltip.replaceChildren();

        if (!node.dataset.details) {
          tooltip.textContent = node.dataset.note || "";
          return;
        }

        const details = JSON.parse(node.dataset.details);
        const title = document.createElement("p");
        title.className = "tooltip-title";
        title.textContent = details.title;
        tooltip.appendChild(title);

        const list = document.createElement("dl");
        detailFields.forEach(([key, term]) => {
          const value = details[key];
          if (!value) return;
          const dt = document.createElement("dt");
          dt.textContent = term;
          const dd = document.createElement("dd");
          dd.textContent = value;
          list.append(dt, dd);
        });
        tooltip.appendChild(list);
      }

      function moveTooltip(event) {
        const gap = 16;
        const margin = 12;
        const rect = tooltip.getBoundingClientRect();
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const hasRoomRight = event.clientX + rect.width + gap + margin <= viewportWidth;
        const left = hasRoomRight
          ? event.clientX + gap
          : Math.max(margin, event.clientX - rect.width - gap);
        const top = Math.min(
          Math.max(margin, (viewportHeight - rect.height) / 2),
          Math.max(margin, viewportHeight - rect.height - margin)
        );

        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top}px`;
      }

      nodes.forEach(node => {
        node.addEventListener("mouseenter", event => highlight(node.dataset.nodeId, node, event));
        node.addEventListener("mousemove", moveTooltip);
        node.addEventListener("mouseleave", clearHighlight);
        node.addEventListener("focusin", event => highlight(node.dataset.nodeId, node, event));
        node.addEventListener("focusout", clearHighlight);
        node.setAttribute("tabindex", "0");
      });
    }

    function componentName(node) {
      if (node.details && node.details.title) return node.details.title;
      if (Array.isArray(node.label)) return node.label.join(" ");
      return node.label || node.id;
    }

    function collectHoverDetails() {
      return Object.values(diagrams).flatMap(diagram => (
        diagram.nodes
          .filter(node => node.details || node.note)
          .map(node => ({
            page: diagram.title,
            component: componentName(node),
            note: node.note || "",
            ...(node.details || {})
          }))
      ));
    }

    function formatDetailsAsText(rows) {
      return [
        "CIAM Architecture Component Details",
        "",
        ...rows.flatMap(row => {
          const lines = [
            `${row.page} - ${row.component}`,
            "=".repeat(`${row.page} - ${row.component}`.length),
            `Page: ${row.page}`,
            `Component: ${row.component}`
          ];

          detailFields.forEach(([key, label]) => {
            if (row[key]) lines.push(`${label}: ${row[key]}`);
          });

          if (row.note) lines.push(`Note: ${row.note}`);
          return [...lines, ""];
        })
      ].join("\r\n");
    }

    function csvCell(value) {
      return `"${String(value || "").replace(/"/g, '""')}"`;
    }

    function formatDetailsAsCsv(rows) {
      const headers = ["Page", "Component", ...detailFields.map(([, label]) => label), "Note"];
      const body = rows.map(row => [
        row.page,
        row.component,
        ...detailFields.map(([key]) => row[key] || ""),
        row.note || ""
      ].map(csvCell).join(","));

      return [headers.map(csvCell).join(","), ...body].join("\r\n");
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function downloadAllHoverDetails() {
      const rows = collectHoverDetails();
      const format = exportFormat.value;
      const isCsv = format === "csv";
      downloadFile(
        `ciam-architecture-component-details.${isCsv ? "csv" : "txt"}`,
        isCsv ? formatDetailsAsCsv(rows) : formatDetailsAsText(rows),
        isCsv ? "text/csv;charset=utf-8" : "text/plain;charset=utf-8"
      );
    }

    downloadDetails.addEventListener("click", downloadAllHoverDetails);

    document.querySelectorAll(".tab-button").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab-button").forEach(tab => tab.setAttribute("aria-selected", "false"));
        button.setAttribute("aria-selected", "true");
        panel.setAttribute("aria-labelledby", button.id);
        render(button.dataset.view);
      });
    });

    render("logical");
  </script>
